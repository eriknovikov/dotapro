name: Deploy Dotapro

on:
  push:
    branches:
      - main

# Required for AWS OIDC authentication
permissions:
  id-token: write
  contents: read

env:
  API_FUNCTION_NAME: dotapro-lambda-api
  SCRAPER_FUNCTION_NAME: dotapro-lambda-scraper
  CF_DISTRIBUTION_ID: E1WWIEAKQHKZ85
  S3_BUCKET_NAME: dotapro-ui
  AWS_REGION: us-east-1 # Change if your resources are in a different region

jobs:
  detect-changes:
    name: Detect Changes
    runs-on: ubuntu-latest
    outputs:
      ui-changed: ${{ steps.changes.outputs.ui }}
      api-changed: ${{ steps.changes.outputs.api }}
      scraper-changed: ${{ steps.changes.outputs.scraper }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Detect Changes
        id: changes
        uses: dorny/paths-filter@v3
        with:
          filters: |
            ui:
              - 'ui/**'
            api:
              - 'api/**'
            scraper:
              - 'scraper/**'

  deploy-ui:
    name: Deploy UI
    needs: detect-changes
    if: needs.detect-changes.outputs.ui-changed == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "pnpm"
          cache-dependency-path: ui/pnpm-lock.yaml

      - name: Install Dependencies
        working-directory: ./ui
        run: pnpm install --frozen-lockfile

      - name: Build UI
        working-directory: ./ui
        env:
          # IMPORTANT: Pass your production API URL here so Vite bakes it into the build
          VITE_API_URL: ${{ secrets.VITE_PROD_API_URL }}
        run: pnpm build

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Upload Assets (Cache Forever)
        run: |
          aws s3 sync ui/dist s3://${{ env.S3_BUCKET_NAME }} \
            --delete \
            --exclude "index.html" \
            --cache-control "max-age=31536000, public, immutable"

      - name: Upload Entry Point (No Cache)
        run: |
          aws s3 cp ui/dist/index.html s3://${{ env.S3_BUCKET_NAME }}/index.html \
            --cache-control "no-cache, no-store, must-revalidate"

      - name: Invalidate CloudFront Cache
        run: |
          aws cloudfront create-invalidation \
            --distribution-id ${{ env.CF_DISTRIBUTION_ID }} \
            --paths "/*"

  deploy-api:
    name: Deploy API
    needs: detect-changes
    if: needs.detect-changes.outputs.api-changed == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.25"
          cache: true
          cache-dependency-path: api/go.sum

      - name: Build API
        run: |
          mkdir -p .build
          cd api && \
            GOOS=linux GOARCH=arm64 go build -o bootstrap . && \
            cd .. && \
            zip -j .build/api.zip api/bootstrap && \
            rm api/bootstrap

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Deploy API Function
        run: |
          aws lambda update-function-code \
            --function-name ${{ env.API_FUNCTION_NAME }} \
            --zip-file fileb://.build/api.zip

      - name: Wait for API Deployment
        run: |
          aws lambda wait function-updated-v2 \
            --function-name ${{ env.API_FUNCTION_NAME }}

  deploy-scraper:
    name: Deploy Scraper
    needs: detect-changes
    if: needs.detect-changes.outputs.scraper-changed == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.25"
          cache: true
          cache-dependency-path: scraper/go.sum

      - name: Build Scraper
        run: |
          mkdir -p .build
          cd scraper && \
            GOOS=linux GOARCH=arm64 go build -o bootstrap . && \
            cd .. && \
            zip -j .build/scraper.zip scraper/bootstrap && \
            rm scraper/bootstrap

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Deploy Scraper Function
        run: |
          aws lambda update-function-code \
            --function-name ${{ env.SCRAPER_FUNCTION_NAME }} \
            --zip-file fileb://.build/scraper.zip

      - name: Wait for Scraper Deployment
        run: |
          aws lambda wait function-updated-v2 \
            --function-name ${{ env.SCRAPER_FUNCTION_NAME }}
