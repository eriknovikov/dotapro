openapi: 3.0.0
info:
  title: Dotapro API
  description: API for managing matches and series
  version: 1.0.0

paths:
  /matches:
    get:
      summary: Get list of matches
      description: Get list of matches
      parameters:
        - name: status
          in: query
          description: Filter by match status (e.g., live, finished)
          schema:
            type: string
        - name: limit
          in: query
          description: Number of results to return
          schema:
            type: integer
            default: 10
      responses:
        "200":
          description: A list of matches
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Match"

  /matches/{id}:
    get:
      summary: Get match by ID
      parameters:
        - name: id
          in: path
          required: true
          description: The unique ID of the match
          schema:
            type: string
      responses:
        "200":
          description: Match details found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Match"
        "404":
          description: Match not found

  # --- SERIES ENDPOINTS ---
  /series:
    get:
      summary: Get all series
      responses:
        "200":
          description: Success

  /series/{id}:
    get:
      summary: Get series by ID
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Success

# --- DATA MODELS (Reusable objects) ---
components:
  schemas:
    Match:
      type: object
      properties:
        id:
          type: string
        home_team:
          type: string
        away_team:
          type: string
        score:
          type: string
